# 集成测试为了匹配CI，我调小了fe的内存
networks:
  custom_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.80.0/24

services:
  fe:
    image: apache/doris:fe-4.0.1
    hostname: fe
    entrypoint:
      - bash
      - -lc
      - |
        sed -i 's/-Xmx8192m -Xms8192m/-Xmx1024m -Xms1024m -XX:-UseContainerSupport/' /opt/apache-doris/fe/conf/fe.conf
        exec bash /usr/local/bin/init_fe.sh
    ports:
      - 8030:8030
      - 9030:9030
      - 9010:9010
      - 8070:8070
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - FE_ID=1
    healthcheck:
      test: ["CMD-SHELL", "mysql -h127.0.0.1 -P9030 -uroot -N -s -e 'SHOW FRONTENDS;' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      custom_network:
        ipv4_address: 172.20.80.2

  be:
    image: apache/doris:be-4.0.1
    hostname: be
    entrypoint:
      - bash
      - -lc
      - |
        sed -i 's/-Xmx2048m/-Xmx1024m -XX:-UseContainerSupport/' /opt/apache-doris/be/conf/be.conf
        exec /usr/local/bin/entry_point.sh
    ports:
      - 8040:8040
      - 9050:9050
      - 8050:8050
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - BE_ADDR=172.20.80.3:9050
    depends_on:
      fe:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8040/ >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      custom_network:
        ipv4_address: 172.20.80.3
