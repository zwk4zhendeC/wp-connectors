worker_processes auto;

events {
    worker_connections 4096;
}

http {

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    client_max_body_size 10g;
    server {
        listen 80;

        # HTTP sink 接收端，覆盖 basic/auth/gzip 三类性能测试场景
        location ~ ^/(ingest|auth/ingest|gzip/ingest)(/.*)?$ {
            access_log off;
            return 200 "ok\n";
        }

        # nginx 统计接口
        location /nginx_status {
            stub_status;
            allow all;
        }
    }
}
